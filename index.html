<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BullishBot HQ</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0a0a0a; font-family:monospace; overflow:hidden; }
#hud {
  position:fixed; top:0; left:0; right:0; height:44px;
  background:rgba(0,0,0,0.95); border-bottom:2px solid #1a4a1a;
  display:flex; align-items:center; justify-content:space-between;
  padding:0 16px; z-index:100;
}
#hud-title { color:#7fc87f; font-size:12px; letter-spacing:3px; }
#hud-stats { display:flex; gap:16px; }
.hstat { font-size:10px; color:#3a6a3a; }
.hstat span { color:#7fc87f; }
#world { position:fixed; top:44px; left:0; right:0; bottom:60px; overflow:hidden; }
canvas { position:absolute; top:0; left:0; image-rendering:pixelated; image-rendering:crisp-edges; }
.speech-bubble {
  position:absolute; background:#fff; border:2px solid #000;
  border-radius:4px; padding:4px 7px; font-size:9px; color:#000;
  pointer-events:none; z-index:50; line-height:1.4; max-width:120px;
  box-shadow:2px 2px 0 #000;
}
.speech-bubble::after {
  content:''; position:absolute; bottom:-8px; left:10px;
  border:4px solid transparent; border-top-color:#000;
}
#log-bar {
  position:fixed; bottom:0; left:0; right:0; height:60px;
  background:rgba(0,0,0,0.95); border-top:2px solid #1a4a1a;
  padding:6px 12px; z-index:100;
}
.log-entry { font-size:9px; color:#3a6a3a; padding:1px 0; }
.log-entry.signal { color:#7fc87f; }
.log-entry.warn { color:#f0b429; }
#panel-overlay {
  display:none; position:fixed; top:44px; left:0; right:0; bottom:60px;
  background:rgba(0,8,0,0.97); z-index:200; padding:20px; overflow-y:auto;
}
#panel-overlay.open { display:block; }
.panel-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; border-bottom:1px solid #1a4a1a; padding-bottom:10px; }
.panel-title { color:#7fc87f; font-size:14px; }
.panel-close { background:#1a3a1a; border:1px solid #2d5a2d; color:#7fc87f; font-size:11px; padding:4px 10px; cursor:pointer; border-radius:3px; font-family:monospace; }
.panel-row { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
.panel-label { color:#5a9a5a; font-size:11px; }
.panel-input { background:#0a1a0a; border:1px solid #2d5a2d; color:#7fc87f; font-size:11px; padding:4px 8px; width:110px; text-align:right; font-family:monospace; border-radius:3px; }
.panel-save { background:#2d5a2d; border:1px solid #5a9a5a; color:#7fc87f; font-size:12px; padding:8px; width:100%; cursor:pointer; font-family:monospace; border-radius:3px; margin-top:10px; }
.panel-bio { color:#5a9a5a; font-size:10px; line-height:1.6; margin-bottom:14px; padding:8px; background:#0a1a0a; border-radius:3px; border:1px solid #1a3a1a; }
.section-title { color:#3a6a3a; font-size:9px; margin-bottom:8px; margin-top:14px; border-bottom:1px solid #0a2a0a; padding-bottom:3px; }
.last-action { color:#7fc87f; font-size:10px; padding:6px 8px; background:#0a1a0a; border:1px solid #1a3a1a; border-radius:3px; margin-bottom:14px; }
.status-pill { display:inline-block; padding:2px 8px; border-radius:3px; font-size:9px; margin-left:8px; }
.s-active { background:#1a3a1a; color:#7fc87f; border:1px solid #2d5a2d; }
.s-alert { background:#3a2a0a; color:#f0b429; border:1px solid #5a3a1a; }
.s-sleep { background:#111; color:#555; border:1px solid #222; }
</style>
</head>
<body>
<div id="hud">
  <div id="hud-title">▶ BULLISHBOT HQ</div>
  <div id="hud-stats">
    <div class="hstat">BAL: <span>$307.35</span></div>
    <div class="hstat">VIX: <span>19.1 ✓</span></div>
    <div class="hstat">TRADES: <span>0</span></div>
    <div class="hstat">FLOOR: <span>$261.36</span></div>
    <div class="hstat">MODE: <span>LIVE</span></div>
  </div>
</div>
<div id="world">
  <canvas id="fc"></canvas>
  <canvas id="sc"></canvas>
</div>
<div id="log-bar">
  <div class="log-entry signal" id="l0">▶ bullishbot hq online — all agents reporting</div>
  <div class="log-entry warn" id="l1">▶ 13:09 ET — IND: TSLA ADX 54.0 out of range</div>
  <div class="log-entry" id="l2">▶ 13:09 ET — ICT: SPY no directional bias</div>
  <div class="log-entry" id="l3">▶ 13:09 ET — RISK: balance $307.35 healthy</div>
</div>
<div id="panel-overlay">
  <div class="panel-header">
    <div class="panel-title" id="p-title">Agent</div>
    <button class="panel-close" onclick="closePanel()">✕ close</button>
  </div>
  <div id="p-content"></div>
</div>

<script>
const BASE = 'https://nauyaane.github.io/bullishbot-hq/Pixel_Office_32x32_v1.1/PNG';

// Characters.png: 320x320, 5 rows x 8 cols
// Each frame: 40w x 64h in source
// Row 0=blue boss, Row 1=glasses guy, Row 2=dark woman, Row 3=pink woman, Row 4=light blue guy
// Columns 0-1 = front facing idle (we use just these 2)

const SRC_W = 40;   // source frame width
const SRC_H = 64;   // source frame height
const DST_W = 64;   // display width on screen
const DST_H = 102;  // display height (maintains aspect ratio 40:64 = DST_W:DST_H)

const W = window.innerWidth;
const H = window.innerHeight - 104;

// All agents anchored to same Y — bottom of sprite at this Y
const SPRITE_BOT = Math.round(H * 0.62);

const CHAR_IMG = new Image();
CHAR_IMG.src = BASE + '/Characters/Characters.png';

const agents = [
  { id:'ict',  name:'ICT Agent',      color:'#4a9aff', state:'active',   row:0,
    msg:'SPY @ $737\nnot at key level',
    role:'Scans SPY and QQQ every 60s for ICT key levels, Fair Value Gaps, and 1-minute confirmation.',
    ax: Math.round(W*0.10),
    settings:[{label:'Tickers',key:'t',val:'SPY, QQQ'},{label:'Window start',key:'ws',val:'10:00 AM ET'},{label:'Window end',key:'we',val:'3:30 PM ET'},{label:'Min R:R',key:'rr',val:'1.5'}]
  },
  { id:'ind',  name:'IND Agent',      color:'#f0b429', state:'alert',    row:1,
    msg:'TSLA ADX 54\nout of range!',
    role:'Scans TSLA, NVDA, IWM for ADX/MACD/RSI/VWAP/Volume confluence signals.',
    ax: Math.round(W*0.28),
    settings:[{label:'ADX min',key:'adx_min',val:'25'},{label:'ADX max',key:'adx_max',val:'48'},{label:'Volume mult',key:'vol',val:'1.5x'},{label:'BB expand',key:'bb',val:'yes'}]
  },
  { id:'risk', name:'Risk Manager',   color:'#7fc87f', state:'active',   row:2,
    msg:'Balance OK\nFloor: $261.36',
    role:'Monitors balance, VIX filter, drawdown limits, trailing floor, and kill switch.',
    ax: Math.round(W*0.50),
    settings:[{label:'Risk per trade',key:'r',val:'35%'},{label:'VIX min',key:'vmin',val:'16'},{label:'VIX max',key:'vmax',val:'25'},{label:'Max daily loss',key:'ml',val:'15%'}]
  },
  { id:'exec', name:'Order Executor', color:'#9a7fff', state:'sleeping', row:3,
    msg:'Standing by\nNo signal yet',
    role:'Places LIMIT orders on Schwab when signal confirmed. Picks best contract by delta, DTE and volume.',
    ax: Math.round(W*0.70),
    settings:[{label:'DTE min',key:'dmin',val:'0'},{label:'DTE max',key:'dmax',val:'3'},{label:'Delta min',key:'delmin',val:'0.10'},{label:'Min vol',key:'mv',val:'25'}]
  },
  { id:'exit', name:'Exit Monitor',   color:'#ff9f7f', state:'sleeping', row:4,
    msg:'No open\npositions',
    role:'Watches open positions and fires partial exits at profit targets or stop loss at -40%.',
    ax: Math.round(W*0.88),
    settings:[{label:'Stop loss',key:'sl',val:'40%'},{label:'Exit 1',key:'e1',val:'+20%'},{label:'Exit 2',key:'e2',val:'+40%'},{label:'Exit 3',key:'e3',val:'+75%'}]
  },
];

const fcEl = document.getElementById('fc');
const scEl = document.getElementById('sc');
fcEl.width = scEl.width = W;
fcEl.height = scEl.height = H;
const fctx = fcEl.getContext('2d');
const sctx = scEl.getContext('2d');
sctx.imageSmoothingEnabled = false;
fctx.imageSmoothingEnabled = false;

function drawFloor() {
  fctx.fillStyle = '#0f0d08';
  fctx.fillRect(0,0,W,H);
  const ts = 32;
  for(let x=0; x<W; x+=ts) {
    for(let y=56; y<H; y+=ts) {
      fctx.fillStyle = ((Math.floor(x/ts)+Math.floor(y/ts))%2===0) ? '#1c1810' : '#201c12';
      fctx.fillRect(x,y,ts,ts);
    }
  }
  fctx.fillStyle='#100e08'; fctx.fillRect(0,0,W,57);
  fctx.fillStyle='#2a2416'; fctx.fillRect(0,55,W,2);
  [[50,6],[160,6],[W/2-28,6],[W-210,6],[W-100,6]].forEach(([wx,wy])=>{
    fctx.fillStyle='#081828'; fctx.fillRect(wx,wy,50,44);
    fctx.fillStyle='#1a4a6a'; fctx.globalAlpha=0.3;
    fctx.fillRect(wx+2,wy+2,46,40); fctx.globalAlpha=1;
    fctx.strokeStyle='#223344'; fctx.lineWidth=1.5;
    fctx.strokeRect(wx,wy,50,44);
    fctx.beginPath();
    fctx.moveTo(wx+25,wy); fctx.lineTo(wx+25,wy+44);
    fctx.moveTo(wx,wy+22); fctx.lineTo(wx+50,wy+22);
    fctx.strokeStyle='#162030'; fctx.lineWidth=1; fctx.stroke();
  });
  fctx.fillStyle='#081408'; fctx.fillRect(W/2-120,3,240,50);
  fctx.strokeStyle='#1a4a1a'; fctx.lineWidth=1;
  fctx.strokeRect(W/2-120,3,240,50);
  fctx.font='bold 9px monospace'; fctx.textAlign='center';
  fctx.fillStyle='#00cc44'; fctx.fillText('SPY $737  QQQ $718  IWM $296',W/2,18);
  fctx.fillStyle='#3a7a3a'; fctx.fillText('TSLA $386  NVDA $202  VIX 19.1',W/2,30);
  fctx.fillStyle='#f0b429'; fctx.fillText('● SCANNING — NO SIGNAL CONFIRMED',W/2,44);
  fctx.textAlign='left';
  [[30,H-90],[W-50,H-90]].forEach(([px,py])=>{
    fctx.fillStyle='#2a1a08'; fctx.fillRect(px+5,py+16,8,10);
    fctx.fillStyle='#1a3a08'; fctx.fillRect(px+1,py+9,14,8);
    fctx.fillStyle='#2a5a0a'; fctx.fillRect(px+3,py,10,10);
    fctx.fillRect(px-3,py+4,8,8); fctx.fillRect(px+11,py+4,8,8);
  });
}

function drawDesk(ax, botY) {
  const dw = DST_W + 36;
  const dh = 24;
  const dx = ax - dw/2;
  const dy = botY - dh;
  sctx.fillStyle='#3d2b1a'; sctx.fillRect(dx, dy, dw, dh);
  sctx.fillStyle='#4a3420'; sctx.fillRect(dx, dy, dw, 4);
  sctx.fillStyle='#2a1a08';
  sctx.fillRect(dx+4, botY, 5, 10);
  sctx.fillRect(dx+dw-9, botY, 5, 10);
  // monitor
  sctx.fillStyle='#0a0a18'; sctx.fillRect(ax-10, dy-20, 20, 16);
  sctx.fillStyle='#003322'; sctx.fillRect(ax-9, dy-19, 18, 13);
  sctx.fillStyle='#00ff44'; sctx.globalAlpha=0.5;
  sctx.fillRect(ax-7, dy-17, 14, 9); sctx.globalAlpha=1;
  sctx.fillStyle='#111'; sctx.fillRect(ax-2, dy-3, 4, 4);
  sctx.fillStyle='#2a2a2a'; sctx.fillRect(ax-12, dy+3, 16, 4);
}

let tick = 0;

function drawAgents() {
  sctx.clearRect(0,0,W,H);

  // slow down anim: change frame every 30 ticks
  const animFrame = Math.floor(tick / 30) % 2;
  tick++;

  agents.forEach((a, i) => {
    const ax = a.ax;
    const bob = a.state==='sleeping' ? 0 : Math.sin(tick*0.05+i)*2;
    const botY = SPRITE_BOT + bob;
    const topY = botY - DST_H;
    const dx = ax - DST_W/2;

    // draw desk behind character
    drawDesk(ax, botY);

    // draw exactly ONE frame from spritesheet
    // srcX = col * 40, srcY = row * 64
    const col = a.state==='sleeping' ? 0 : animFrame;
    const srcX = col * SRC_W;
    const srcY = a.row * SRC_H;

    if(CHAR_IMG.naturalWidth > 0) {
      sctx.globalAlpha = a.state==='sleeping' ? 0.4 : 1;
      sctx.drawImage(
        CHAR_IMG,
        srcX, srcY,      // source x, y
        SRC_W, SRC_H,    // source width, height (one frame only)
        dx, topY,        // dest x, y
        DST_W, DST_H     // dest width, height
      );
      sctx.globalAlpha = 1;
    }

    // status dot
    if(a.state !== 'sleeping') {
      const pulse = 2.5 + Math.abs(Math.sin(tick*0.06+i))*2.5;
      sctx.fillStyle = a.state==='alert' ? '#f0b429' : '#7fc87f';
      sctx.beginPath();
      sctx.arc(dx+DST_W+3, topY+5, pulse, 0, Math.PI*2);
      sctx.fill();
    }

    // Z for sleeping
    if(a.state==='sleeping') {
      const zOff = ((tick*0.006)+i*0.5)%1;
      sctx.globalAlpha = Math.max(0, 1-zOff);
      sctx.fillStyle='#888';
      sctx.font='bold 11px monospace';
      sctx.fillText('z', ax+DST_W*0.3, topY - zOff*16);
      sctx.globalAlpha=1;
    }

    // name label
    const label = a.name.toUpperCase();
    const lw = label.length*5.5+12;
    const labelY = botY + 14;
    sctx.fillStyle='rgba(0,0,0,0.85)';
    sctx.fillRect(ax-lw/2, labelY, lw, 13);
    sctx.fillStyle = a.state==='sleeping' ? '#555' : a.color;
    sctx.font='7px monospace';
    sctx.textAlign='center';
    sctx.fillText(label, ax, labelY+9);
    sctx.textAlign='left';
  });
}

const bubbleEls = {};
function initBubbles() {
  const world = document.getElementById('world');
  agents.forEach(a => {
    const b = document.createElement('div');
    b.className='speech-bubble';
    b.id='bub-'+a.id;
    b.innerHTML = a.msg.replace('\n','<br>');
    world.appendChild(b);
    bubbleEls[a.id]=b;
  });
}

function updateBubbles() {
  agents.forEach(a => {
    const b = bubbleEls[a.id];
    if(!b) return;
    const topY = SPRITE_BOT - DST_H;
    const bw = 120;
    b.style.left = Math.max(5, Math.min(W-bw-5, a.ax-bw/2)) + 'px';
    b.style.top = Math.max(60, topY - 52) + 'px';
  });
}

scEl.addEventListener('click', function(e){
  const rect = scEl.getBoundingClientRect();
  const mx = (e.clientX-rect.left)*(W/rect.width);
  const my = (e.clientY-rect.top)*(H/rect.height);
  agents.forEach(a => {
    const topY = SPRITE_BOT - DST_H;
    const dx = a.ax - DST_W/2;
    if(mx>=dx-10 && mx<=dx+DST_W+10 && my>=topY && my<=SPRITE_BOT+30){
      openPanel(a);
    }
  });
});

function openPanel(a){
  document.getElementById('p-title').textContent = a.name;
  const sc_ = {active:'s-active',alert:'s-alert',sleeping:'s-sleep'}[a.state];
  const st_ = {active:'● active',alert:'⚠ alert',sleeping:'○ sleeping'}[a.state];
  let html = `<div style="color:${a.color};font-size:13px;margin-bottom:10px;">${a.name} <span class="status-pill ${sc_}">${st_}</span></div>
  <div class="panel-bio">${a.role}</div>
  <div class="section-title">last action</div>
  <div class="last-action">${a.msg.replace('\n',' — ')}</div>
  <div class="section-title">settings</div>`;
  a.settings.forEach(s => {
    html += `<div class="panel-row"><span class="panel-label">${s.label}</span><input class="panel-input" value="${s.val}" data-key="${s.key}"></div>`;
  });
  html += `<button class="panel-save" onclick="savePanel('${a.id}')">▶ save changes</button>`;
  document.getElementById('p-content').innerHTML = html;
  document.getElementById('panel-overlay').classList.add('open');
}

function closePanel(){ document.getElementById('panel-overlay').classList.remove('open'); }

function savePanel(id){
  const a = agents.find(x=>x.id===id);
  document.querySelectorAll('.panel-input').forEach(inp=>{
    const s = a.settings.find(x=>x.key===inp.dataset.key);
    if(s) s.val = inp.value;
  });
  document.getElementById('l0').textContent = `▶ ${a.name} settings saved`;
  document.getElementById('l0').className = 'log-entry signal';
  closePanel();
}

function loop(){
  drawFloor();
  drawAgents();
  updateBubbles();
  requestAnimationFrame(loop);
}

initBubbles();
loop();
</script>
</body>
</html>
